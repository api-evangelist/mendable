meters:
- name: message_credits
  description: Credits consumed per chat answer, varying by the model used to generate the answer.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - project
  - model
- name: answers
  description: Number of chat answers served via mendableChat.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - project
- name: ingested_documents
  description: Raw documents and crawled pages ingested into projects.
  unit: documents
  aggregation: sum
  dimensions:
  - account
  - project
  - source_type
principles:
- name: Visibility
  description: Use the Mendable analytics platform and data export to inspect message-credit burn per project.
- name: Allocation
  description: Separate API keys / projects per workload or team and map credit consumption to cost centers.
- name: Optimization
  description: Route lower-complexity questions to cheaper models (1-credit) and reserve GPT-4 / tool-using answers (3-credit) for high-value queries; tune retriever_options to control retrieval cost.
- name: Accountability
  description: Assign owners per project, review monthly credit consumption against the plan allotment, and upgrade only when sustained overage warrants it.
