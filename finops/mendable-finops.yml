description: >-
  FinOps view of Mendable spend. Mendable bills through a monthly message-credit
  model where each chat answer consumes credits that vary by the underlying
  model (for example GPT-3.5-Turbo ~1 credit, Claude ~2, GPT-4 / tool-using ~3).
  A Free tier includes a fixed monthly credit allotment; the Enterprise tier is
  sales-led with custom credit volumes, bring-your-own-key models, SSO, and SLA.
  Data ingestion is included within the plan rather than separately metered.
notes: >-
  Per-model credit costs and the exact Free allotment are subject to change;
  verify against the Mendable pricing page during reconciliation. Enterprise
  pricing is contact-sales, so dollar amounts are not reconciled.
